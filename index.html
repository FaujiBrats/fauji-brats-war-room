<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fauji Brats Cricket Club</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
    <img src="assets/logo.png" class="logo">

    <div class="menu">
        <a href="#home">Home</a>
        <a href="#kit">Kit</a>
        <a href="#register">Register</a>
        <a href="#suggestions">Suggestions</a>
    </div>
</nav>

<section id="home" class="hero">

    <div class="overlay">

        <img src="assets/logo.png" class="hero-logo">

        <h1>FAUJI BRATS CRICKET CLUB</h1>

        <h2>RESPECT ALL. FEAR NONE.</h2>

        <p>
            Discipline • Brotherhood • Victory
        </p>

        <a href="#register" class="btn">
            Join The Club
        </a>

    </div>

</section>

<section id="kit">

    <h2 class="section-title">
        Official Kit Collection
    </h2>

    <div class="kit-grid">

        <div class="card">
            <img src="assets/jersey.png">
            <h3>Official Match Jersey</h3>
        </div>

        <div class="card">
            <img src="assets/cap.png">
            <h3>Premium Club Cap</h3>
        </div>

        <div class="card">
            <img src="assets/trackpant.png">
            <h3>Official Track Pant</h3>
        </div>

    </div>

</section>

<section id="register">

<h2 class="section-title">
<form id="playerForm">

<h3>Player Registration</h3>

<input id="fullName" placeholder="Full Name" required>

<input id="nickName" placeholder="Nick Name">

<input id="mobile" placeholder="Mobile Number">

<input id="email" placeholder="Email">

<select id="playerType">
<option value="">Select Player Type</option>
<option>Batsman</option>
<option>Bowler</option>
<option>All Rounder</option>
<option>Wicket Keeper</option>
</select>

<input id="jerseyName" placeholder="Jersey Print Name">

<input id="jerseyNumber" placeholder="Jersey Number">

<select id="jerseySize">
<option value="">Jersey Size</option>
<option>XS</option>
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
<option>XXL</option>
<option>XXXL</option>
</select>

<select id="sleeveType">
<option>Half Sleeve</option>
<option>Full Sleeve</option>
</select>

<select id="availability">
<option>Available</option>
<option>Not Available</option>
</select>

<input id="pantSize" placeholder="Pant Size">

<input id="capSize" placeholder="Cap Size">

<button type="submit">
Register
</button>

</form>

</button>

</form>

</section>

<section id="suggestions">

<h2 class="section-title">
Anonymous War Room
</h2>

<textarea
id="suggestion"
placeholder="Your suggestion">
</textarea>

<button id="suggestBtn">
Submit Suggestion
</button>

</section>

<script src="js/app.js"></script>

</body>
</html>
